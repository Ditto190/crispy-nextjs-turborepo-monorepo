name: Issue Triage Helper

on:
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Label and classify issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const title = (context.payload.issue.title || '').toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = `${title}\n${body}`;

            const desired = new Set(['needs-triage']);
            if (/(\bci\b|workflow|github actions|build fail|lint fail|test fail|pipeline)/.test(text)) desired.add('ci');
            if (/(bug|broken|error|regression|unexpected|fail)/.test(text)) desired.add('bug');
            if (/(feature|enhancement|improve|request)/.test(text)) desired.add('enhancement');
            if (/(docs|readme|documentation)/.test(text)) desired.add('documentation');
            if (/(question|how do i|how to)/.test(text)) desired.add('question');

            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const available = new Set(labels.map((label) => label.name));
            const toAdd = [...desired].filter((name) => available.has(name));

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: toAdd,
              });
            }

            if (context.payload.action !== 'edited') {
              const labelLine = toAdd.length > 0 ? `Applied labels: ${toAdd.map((l) => `\`${l}\``).join(', ')}` : 'No matching triage labels were available in this repository.';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: [
                  'Thanks for opening this issue. 🤖',
                  labelLine,
                  '',
                  'If this is a CI/debugging problem, include:',
                  '- failing workflow/job URL',
                  '- expected vs actual behavior',
                  '- branch and commit SHA'
                ].join('\n')
              });
            }
